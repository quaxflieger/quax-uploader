<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/img/QuaxMotorFaviocon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Uwe Kamper">
    <title>QUAX-Uploader</title>
    <link rel="shortcut icon" type="image/x-icon" href="/img/QuaxMotorFavicon.png">
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  </head>
  <body class="quax-body">
    <div>
      <a href="https://quax-flieger.de/"><img src="/img/nav-logo-QX.png" style="width: 350px; margin-top: 25px;"></a>
    </div>
    <div id="app">
      <div>
        <h3>Schritt 1: Bist du ein Mensch?</h3>
        <div class="h-captcha" data-sitekey="your_site_key"></div>
      </div>
      <form action="." method="post" >
        <div>
          <label for="id_copyright_name">Name (für Copyright-Hinweise)*</label>
          <input id="id_copyright_name" name="copyright_name" type="text" required="true" />
        </div>

        <div>
          <label for="id_copyright_name">E-Mail-Adresse (für Rückfragen)</label>
          <input id="id_copyright_name" name="copyright_name" type="text" />
        </div>

        <div>
          <label for="id_event_name">QUAX-Veranstaltung</label>
          <input id="id_event_name" name="event_name" type="text" />
        </div>

        <div>
          <label>Verwendung*</label>
          <input name="usage" type="radio" value="public" id="id_radio_public"><label for="id_radio_public">öffentlich</label>
          <input name="usage" type="radio" value="internal" id="id_radio_internal"><label for="id_radio_internal">nur vereins-intern</label>
          <input name="usage" type="radio" value="other" id="id_radio_other"><label for="id_radio_other">andere</label>
        </div>

        <div>
          <label for="id_additional_info">Weitere Infos oder Hinweis zu Deiner Einsendung</label>
          <textarea id="id_additional_info" name="additional_info">

          </textarea>
        </div>
        
         <input type="file" name="file">

         <input type="submit" value="Abschicken">
      </form>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
